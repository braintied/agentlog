name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm run build

  validate-examples:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Validate example files
        run: |
          node -e "
            const { validateAgentLog } = require('./dist/index.js');
            const fs = require('fs');
            const path = require('path');
            const examplesDir = './examples';
            const files = fs.readdirSync(examplesDir).filter(f => f.endsWith('.json'));
            let failed = false;
            for (const file of files) {
              const data = JSON.parse(fs.readFileSync(path.join(examplesDir, file), 'utf-8'));
              const result = validateAgentLog(data);
              if (result.success) {
                console.log('PASS:', file);
              } else {
                console.error('FAIL:', file, result.error);
                failed = true;
              }
            }
            if (failed) process.exit(1);
          "
